  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo">LOCA</div>
    <ul class="nav-links">
      <li><a href="index.html">الرئيسية</a></li>
      <li><a href="products.html">المنتجات</a></li>

      <li><a href="contact.html">تواصل معنا</a></li>
    </ul>

  <section class="section">
    <h2 class="section-title">تواصل معنا</h2>
    <p class="section-subtitle">
      للاستفسار عن منتجات LOCA أو الدرجات المتوفرة، يمكنك إرسال رسالتك من خلال النموذج.
    </p>

    <div class="contact-box">
      <form>
        <label>الاسم الكامل</label>
        <input type="text" placeholder="اكتبي اسمك">

        <label>البريد الإلكتروني</label>
        <input type="email" placeholder="example@email.com">

        <label>المنتج المفضل</label>
        <select>
          <option>Liquid Cream Blush</option>
          <option>Creamy Lip Liner</option>
          <option>Glossy Lip Balm</option>
          <option>Creamy Concealer</option>
          <option>Matte Eye Liner</option>
        </select>

        <label>الرسالة</label>
        <textarea placeholder="اكتبي رسالتك هنا"></textarea>

        <button type="submit" class="btn">إرسال الرسالة</button>
      </form>
    </div>
  </section>

  <footer class="footer">
    <p>© 2026 LOCA Beauty | Saudi Beauty Brand</p>
  </footer>
